doctrine:
  dbal:
    url: '%env(resolve:DATABASE_URL)%'
    profiling_collect_backtrace: '%kernel.debug%'
  orm:
    auto_mapping: true
    naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
    mappings:
      Core:
        is_bundle: false
        type: attribute
        dir: '%kernel.project_dir%/src/Core/Entity'
        prefix: 'App\Core\Entity'
      FixturePredictions:
        is_bundle: false
        type: attribute
        dir: '%kernel.project_dir%/src/FixturePredictions/Entity'
        prefix: 'App\FixturePredictions\Entity'
      User:
        is_bundle: false
        type: attribute
        dir: '%kernel.project_dir%/src/User/Entity'
        prefix: 'App\User\Entity'
    dql:
      string_functions:
        regexp: DoctrineExtensions\Query\Mysql\Regexp

when@test:
  doctrine:
    dbal:
      # "TEST_TOKEN" is typically set by ParaTest
      dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
  doctrine:
    orm:
      query_cache_driver:
        type: pool
        pool: doctrine.system_cache_pool
      result_cache_driver:
        type: pool
        pool: doctrine.result_cache_pool

  framework:
    cache:
      pools:
        doctrine.result_cache_pool:
          adapter: cache.app
        doctrine.system_cache_pool:
          adapter: cache.system
