parameters:
    # App
    app.name: '%env(PROJECT_NAME)%'
    app.url: 'https://%env(DOMAIN_API)%'
    app.support.email: '%env(APP_SUPPORT_EMAIL)%'
    app.mail.domain: '%env(APP_MAIL_DOMAIN)%'

    # Client
    client.url: 'https://%env(DOMAIN)%'
    client.url.auth-verification-success: 'https://%env(DOMAIN)%/auth/sign-in?verify=success'
    client.url.auth-verification-fail: 'https://%env(DOMAIN)%/auth/sign-in?verify=fail'
    client.url.auth-password-change: 'https://%env(DOMAIN)%/auth/password-change'
    client.url.auth-password-reset: 'https://%env(DOMAIN)%/auth/password-reset'
    client.url.email-change-success: 'https://%env(DOMAIN)%/profile?emailChange=success'
    client.url.email-change-fail: 'https://%env(DOMAIN)%/profile?emailChange=fail'

    # Fixtures
    fixtures.football-data-org.api.url: '%env(FOOTBALL_DATA_ORG_URL)%'
    fixtures.football-data-org.api.key: '%env(FOOTBALL_DATA_ORG_KEY)%'